version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: taskflow-db
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: taskflow_db
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: naman
      MYSQL_PASSWORD: namanpassword
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
